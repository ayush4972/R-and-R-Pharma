<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>R.G. Suppliers Pvt. Ltd. | Medical Technology Distribution</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind via CDN preserves the exact Stitch design tokens below -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#fe7c74",
              "primary-container": "#00855d",
              "error-container": "#ffdad6",
              "on-secondary-fixed-variant": "#852221",
              "primary-fixed": "#85f8c4",
              surface: "#f8f9ff",
              "surface-dim": "#cbdbf5",
              outline: "#6d7a72",
              "surface-container-lowest": "#ffffff",
              "on-primary": "#ffffff",
              "tertiary-fixed-dim": "#bec6e0",
              "on-tertiary-fixed-variant": "#3f465c",
              primary: "#006948",
              "on-primary-fixed": "#002114",
              "outline-variant": "#bccac0",
              "surface-container-low": "#eff4ff",
              secondary: "#a53936",
              "on-secondary-fixed": "#410004",
              "on-primary-container": "#f5fff7",
              "tertiary-fixed": "#dae2fd",
              "on-surface-variant": "#3d4a42",
              "on-secondary-container": "#721315",
              error: "#ba1a1a",
              "on-tertiary": "#ffffff",
              "on-tertiary-fixed": "#131b2e",
              "inverse-surface": "#213145",
              "surface-container-highest": "#d3e4fe",
              "surface-container": "#e5eeff",
              "on-secondary": "#ffffff",
              "surface-container-high": "#dce9ff",
              "on-tertiary-container": "#fefcff",
              "secondary-fixed-dim": "#ffb3ad",
              "on-error-container": "#93000a",
              "inverse-on-surface": "#eaf1ff",
              tertiary: "#545c72",
              "on-surface": "#0b1c30",
              "tertiary-container": "#6c748b",
              "on-background": "#0b1c30",
              "primary-fixed-dim": "#68dba9",
              "surface-variant": "#d3e4fe",
              "surface-tint": "#006c4a",
              "on-primary-fixed-variant": "#005137",
              "inverse-primary": "#68dba9",
              "surface-bright": "#f8f9ff",
              "on-error": "#ffffff",
              "secondary-fixed": "#ffdad7",
              background: "#f8f9ff",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              gutter: "24px",
              "container-max": "1280px",
              "margin-desktop": "32px",
              "margin-mobile": "16px",
              unit: "4px",
              "stack-lg": "24px",
              "stack-sm": "8px",
              "stack-md": "16px",
            },
            fontFamily: {
              "headline-md": ["Inter"],
              "body-sm": ["Inter"],
              "label-md": ["Inter"],
              "headline-lg": ["Inter"],
              "mono-label": ["Inter"],
              "body-lg": ["Inter"],
              "body-md": ["Inter"],
              "headline-lg-mobile": ["Inter"],
              "display-lg": ["Inter"],
            },
            fontSize: {
              "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "label-md": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
              "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],

              "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        display: inline-block;
        vertical-align: middle;
      }
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9ff;
      }
      .clinical-shadow {
        box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
      }
      .hero-gradient {
        background: linear-gradient(135deg, #f8f9ff 0%, #eff4ff 100%);
      }
      .product-card-shadow {
        transition: box-shadow 0.2s ease-in-out;
      }
      .product-card-shadow:hover {
        box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
      }
      .form-input:focus {
        border-color: #006948;
        box-shadow: 0 0 0 1px #006948;
        outline: none;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f8f9ff;
      }
      ::-webkit-scrollbar-thumb {
        background: #bccac0;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6d7a72;
      }
    </style>
  </head>
  <body class="bg-surface text-on-background">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
